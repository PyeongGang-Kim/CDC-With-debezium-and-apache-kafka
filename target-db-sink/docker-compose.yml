version: '3.8'

networks:
  cdc-network:
    name: cdc-network
    external: true  # kafka-broker의 cdc-network에 참여

services:
  kafka-connect-sink:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kafka-connect-sink
    networks:
      - cdc-network
    ports:
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      GROUP_ID: oracle-cdc-sink-group
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 2
      OFFSET_STORAGE_REPLICATION_FACTOR: 2
      STATUS_STORAGE_REPLICATION_FACTOR: 2
      CONNECT_PLUGIN_PATH: /kafka/connect
      # 소스와 동일한 컨버터 설정 (JSON with schema)
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      # 타겟 Oracle 연결 정보
      TARGET_ORACLE_NODE1: ${TARGET_ORACLE_NODE1}
      TARGET_ORACLE_NODE2: ${TARGET_ORACLE_NODE2}
      TARGET_ORACLE_PORT: ${TARGET_ORACLE_PORT:-1521}
      TARGET_ORACLE_SERVICE_NAME: ${TARGET_ORACLE_SERVICE_NAME}
      TARGET_ORACLE_USER: ${TARGET_ORACLE_USER}
      TARGET_ORACLE_PASSWORD: ${TARGET_ORACLE_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  sink-connector-init:
    image: curlimages/curl:latest
    container_name: sink-connector-init
    networks:
      - cdc-network
    depends_on:
      kafka-connect-sink:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/register-sink-connector.sh"]
    environment:
      CONNECT_URL: http://kafka-connect-sink:8083
      TARGET_ORACLE_NODE1: ${TARGET_ORACLE_NODE1}
      TARGET_ORACLE_NODE2: ${TARGET_ORACLE_NODE2}
      TARGET_ORACLE_PORT: ${TARGET_ORACLE_PORT:-1521}
      TARGET_ORACLE_SERVICE_NAME: ${TARGET_ORACLE_SERVICE_NAME}
      TARGET_ORACLE_USER: ${TARGET_ORACLE_USER}
      TARGET_ORACLE_PASSWORD: ${TARGET_ORACLE_PASSWORD}
      TOPIC_REGEX: ${TOPIC_REGEX:-oracle\\..*}
    restart: "no"
